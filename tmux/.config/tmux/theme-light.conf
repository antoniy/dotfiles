# Light (day) tmux colours — GitHub Light High Contrast.
# Sourced by ~/.tmux.conf and re-sourced live by the `theme` command.
# Only colour/style options live here; layout stays in ~/.tmux.conf.
# Palette: bg #ffffff, status bg #eaeef2, text #0e1116, blue #0349b4.

# pane border
set -g pane-border-style        "fg=#0349b4" # Blue
set -g pane-active-border-style "fg=#0349b4" # Blue

# message text
set -g message-style "fg=#0349b4,bg=#eaeef2" # Blue on light gray

# pane number display
set -g display-panes-active-colour "#024c5c" # Cyan
set -g display-panes-colour        "#702c00" # Orange

# clock
set-window-option -g clock-mode-colour "#055d20" # Green

# status bar
set -g status-style "fg=#0e1116,bg=#eaeef2" # Near-black text on light gray

# window list
set -g window-status-current-format "#[fg=#ffffff]#[bg=#0349b4] #I: #W #F" # White on Blue
set -g window-status-bell-style "fg=#a0111f,bg=default"                    # Red
set-window-option -g window-status-style "fg=#0349b4,bg=default"          # Blue
set-window-option -g window-status-current-style "fg=#702c00,bg=default"  # Orange
set-window-option -g window-status-bell-style "fg=#ffffff,bg=#a0111f"     # White on Red

# left/right
set -g status-left "#[bg=#eaeef2]#[fg=#0e1116]#{?client_prefix,#[fg=#ffffff]#[bg=#055d20],#[bg=#eaeef2]#[fg=#0e1116]} #S #[bg=#eaeef2]#[fg=#0e1116]#[bold]#{?pane_synchronized,#[fg=#4b535d]痢Sync ON ,}#{?pane_in_mode,#[fg=#512598]#{pane_mode}#{?selection_present,selecting ,}#{?rectangle_toggle,rectangle ,} ,}"
set -g status-right "#[fg=#0349b4] %b %d #[fg=#0e1116] %H:%M "
