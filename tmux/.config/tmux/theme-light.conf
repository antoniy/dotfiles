# Light (day) tmux colours — GitHub Light High Contrast.
# Sourced by ~/.tmux.conf and re-sourced live by the `theme` command.
# Only colour/style options live here; layout stays in ~/.tmux.conf.
# Palette: bg #ffffff, status bg #eaeef2, text #0e1116, blue #0349b4.

# pane border
set -g pane-border-style        "fg=#0349b4" # Blue
set -g pane-active-border-style "fg=#0349b4" # Blue

# message text
set -g message-style "fg=#0349b4,bg=#eaeef2" # Blue on light gray

# pane number display
set -g display-panes-active-colour "#024c5c" # Cyan
set -g display-panes-colour        "#702c00" # Orange

# clock
set-window-option -g clock-mode-colour "#055d20" # Green

# status bar
set -g status-style "fg=#0e1116,bg=default" # Near-black on terminal bg (transparent bar)

# window list — rounded "bubbles".  Each window is a pill: the left/right
# caps ( ) are drawn in the pill's bg colour over the transparent
# (terminal) status bg, so only the pills show.  Current window = Blue pill,
# others = light gray.  No index number — just the window name (#W).
set -g window-status-format         "#[fg=#{?window_activity_flag,#d4a72c,#d0d7de} bg=default]#[fg=#0e1116 bg=#{?window_activity_flag,#d4a72c,#d0d7de}] #W#{?window_bell_flag, !,}#{?window_zoomed_flag, Z,} #[fg=#{?window_activity_flag,#d4a72c,#d0d7de} bg=default]"
set -g window-status-current-format "#[fg=#0349b4,bg=default]#[fg=#ffffff,bg=#0349b4] #W#{?window_zoomed_flag, Z,} #[fg=#0349b4,bg=default]"
set-window-option -g window-status-style "fg=#0349b4,bg=default" # keeps the gaps between pills transparent
set -g window-status-bell-style "fg=#ffffff,bg=#a0111f"          # White on Red

# left/right
set -g status-left "#[bg=default]#[fg=#0e1116]#{?client_prefix,#[fg=#ffffff]#[bg=#055d20],#[bg=default]#[fg=#0e1116]} #S #[bg=default]#[fg=#0e1116]#[bold]#{?pane_synchronized,#[fg=#4b535d]痢Sync ON ,}#{?pane_in_mode,#[fg=#512598]#{pane_mode}#{?selection_present,selecting ,}#{?rectangle_toggle,rectangle ,} ,}"
set -g status-right "#[fg=#0349b4] %b %d #[fg=#0e1116] %H:%M "
