# Dark (night) tmux colours — Catppuccin Mocha.
# Sourced by ~/.tmux.conf and re-sourced live by the `theme` command.
# Only colour/style options live here; layout stays in ~/.tmux.conf.

# pane border
set -g pane-border-style        "fg=#89b4fa" # Blue
set -g pane-active-border-style "fg=#89b4fa" # Blue

# message text
set -g message-style "fg=#89b4fa,bg=#181825" # Blue on Mantle

# pane number display
set -g display-panes-active-colour "#74c7ec" # Sapphire
set -g display-panes-colour        "#fab387" # Peach

# clock
set-window-option -g clock-mode-colour "#a6e3a1" # Green

# status bar
set -g status-style "fg=#f9e2af,bg=#181825" # Yellow on Mantle

# window list
set -g window-status-current-format "#[fg=#181825]#[bg=#89b4fa] #I: #W #F" # Mantle on Blue
set -g window-status-bell-style "fg=#f38ba8,bg=default"                    # Red
set-window-option -g window-status-style "fg=#89b4fa,bg=default"          # Blue
set-window-option -g window-status-current-style "fg=#fab387,bg=default"  # Peach
set-window-option -g window-status-bell-style "fg=#181825,bg=#f38ba8"     # Mantle on Red

# left/right
set -g status-left "#[bg=#181825]#[fg=#f9e2af]#{?client_prefix,#[fg=#181825]#[bg=#a6e3a1],#[bg=#181825]#[fg=#f9e2af]} #S #[bg=#181825]#[fg=#f9e2af]#[bold]#{?pane_synchronized,#[fg=#bac2de]痢Sync ON ,}#{?pane_in_mode,#[fg=#cba6f7]#{pane_mode}#{?selection_present,selecting ,}#{?rectangle_toggle,rectangle ,} ,}"
set -g status-right "#[fg=#89b4fa] %b %d #[fg=#f9e2af] %H:%M "
