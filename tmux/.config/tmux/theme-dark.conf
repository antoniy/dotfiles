# Dark (night) tmux colours — Catppuccin Mocha.
# Sourced by ~/.tmux.conf and re-sourced live by the `theme` command.
# Only colour/style options live here; layout stays in ~/.tmux.conf.

# pane border
set -g pane-border-style        "fg=#89b4fa" # Blue
set -g pane-active-border-style "fg=#89b4fa" # Blue

# message text
set -g message-style "fg=#89b4fa,bg=#181825" # Blue on Mantle

# pane number display
set -g display-panes-active-colour "#74c7ec" # Sapphire
set -g display-panes-colour        "#fab387" # Peach

# clock
set-window-option -g clock-mode-colour "#a6e3a1" # Green

# status bar
set -g status-style "fg=#f9e2af,bg=default" # Yellow on terminal bg (transparent bar)

# window list — rounded "bubbles".  Each window is a pill: the left/right
# caps ( ) are drawn in the pill's bg colour over the transparent
# (terminal) status bg, so only the pills show.  Current window = Blue pill,
# others = Surface0.  No index number — just the window name (#W).
set -g window-status-format         "#[fg=#{?window_activity_flag,#f9e2af,#313244} bg=default]#[fg=#{?window_activity_flag,#1e1e2e,#cdd6f4} bg=#{?window_activity_flag,#f9e2af,#313244}] #W#{?window_bell_flag, !,}#{?window_zoomed_flag, Z,} #[fg=#{?window_activity_flag,#f9e2af,#313244} bg=default]"
set -g window-status-current-format "#[fg=#89b4fa,bg=default]#[fg=#1e1e2e,bg=#89b4fa] #W#{?window_zoomed_flag, Z,} #[fg=#89b4fa,bg=default]"
set-window-option -g window-status-style "fg=#89b4fa,bg=default" # keeps the gaps between pills transparent
set -g window-status-bell-style "fg=#181825,bg=#f38ba8"          # Mantle on Red

# left/right
set -g status-left "#[bg=default]#[fg=#f9e2af]#{?client_prefix,#[fg=#181825]#[bg=#a6e3a1],#[bg=default]#[fg=#f9e2af]} #S #[bg=default]#[fg=#f9e2af]#[bold]#{?pane_synchronized,#[fg=#bac2de]痢Sync ON ,}#{?pane_in_mode,#[fg=#cba6f7]#{pane_mode}#{?selection_present,selecting ,}#{?rectangle_toggle,rectangle ,} ,}"
set -g status-right "#[fg=#89b4fa] %b %d #[fg=#f9e2af] %H:%M "
